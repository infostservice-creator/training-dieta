<style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script>
const {useState,useEffect,useRef}=React;
const h=React.createElement;
const TODAY=new Date().toISOString().split('T')[0];

// LocalStorage helpers
const lsGet=k=>{try{return localStorage.getItem(k);}catch(e){return null;}};
const lsSet=(k,v)=>{try{localStorage.setItem(k,typeof v==='string'?v:JSON.stringify(v));}catch(e){}};
const lsGetJ=k=>{const v=lsGet(k);try{return v?JSON.parse(v):null;}catch(e){return null;}};

const BASE_PROFILE=`Uomo circa 35 anni, 173 cm, peso iniziale 66.7 kg, sedentario totale, neurodivergente. Obiettivi: ricomposizione corporea, postura, energia, definizione. LIMITAZIONI: LCA+menisco ginocchio destro (no saltelli/impatto), ernie cervicali (no sovraccarico cervicale). Attrezzatura: corpo libero+TRX. Tempo: 5-10 min/giorno. Target: ~1750 kcal/giorno, proteine 130-135g.`;
const getProfile=ex=>BASE_PROFILE+(ex&&ex.length?'\nAttività extra: '+ex.join(', '):'');
const getWeekKey=()=>{const d=new Date(),y=d.getFullYear(),s=new Date(y,0,1),w=Math.ceil(((d-s)/86400000+s.getDay()+1)/7);return`${y}-W${w}`;};

// Gemini API
async function callGemini(sys,usr,maxT=1200){
  const key=lsGet('fit_api_key');
  if(!key)throw new Error('API key mancante');
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',messages:[{role:'system',content:sys},{role:'user',content:usr}],max_tokens:maxT,temperature:0.7})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.choices[0].message.content;
}
async function callAPI(sys,usr,maxT=1200){
  const t=await callGemini(sys,usr,maxT);
  return JSON.parse(t.replace(/```json\n?|\n?```/g,'').trim());
}
async function callTxt(sys,usr,maxT=500){return callGemini(sys,usr,maxT);}

// Setup screen
function ApiKeySetup({onSave}){
  const [key,setKey]=useState(''),[testing,setTesting]=useState(false),[err,setErr]=useState('');
  async function go(){
    if(!key.trim())return;
    setTesting(true);setErr('');
    try{
      lsSet('fit_api_key',key.trim());
      await callTxt('Rispondi solo: ok','test',20);
      onSave(key.trim());
    }catch(e){setErr('Chiave non valida o errore. Controlla e riprova.');lsSet('fit_api_key','');}
    setTesting(false);
  }
  const card={background:'var(--color-background-primary)',border:'0.5px solid var(--color-border-tertiary)',borderRadius:'var(--border-radius-lg)',padding:'1.5rem'};
  const box={background:'var(--color-background-secondary)',borderRadius:'var(--border-radius-md)',padding:'1rem',marginBottom:'1.5rem'};
  return h('div',{style:{maxWidth:400,margin:'2rem auto'}},
    h('div',{style:card},
      h('div',{style:{fontSize:24,fontWeight:500,color:'var(--color-text-primary)',marginBottom:6}},'Training & Dieta'),
      h('div',{style:{fontSize:14,color:'var(--color-text-secondary)',marginBottom:'1.5rem',lineHeight:1.65}},'La tua app di allenamento e dieta personalizzata. Per funzionare ha bisogno di una chiave API Groq — è gratuita.'),
      h('div',{style:box},
        h('div',{style:{fontSize:13,fontWeight:500,color:'var(--color-text-primary)',marginBottom:10}},'Come ottenere la chiave (3 minuti):'),
        ['1. Vai su console.groq.com','2. Accedi o registrati','3. Clicca "Chiavi API" → "Crea chiave API"','4. Copia la chiave e incollala qui sotto'].map((s,i)=>
          h('div',{key:i,style:{fontSize:13,color:'var(--color-text-secondary)',padding:'3px 0',lineHeight:1.5}},s)
        ),
        h('a',{href:'https://console.groq.com/keys',target:'_blank',style:{display:'block',marginTop:12,fontSize:13,color:'var(--color-text-info)',textDecoration:'none'}},'→ Apri Google AI Studio')
      ),
      h('input',{type:'password',value:key,onChange:e=>setKey(e.target.value),onKeyDown:e=>{if(e.key==='Enter')go();},placeholder:'Incolla qui la chiave (gsk_...)',style:{width:'100%',padding:'10px 12px',marginBottom:10,borderRadius:'var(--border-radius-md)',border:'0.5px solid var(--color-border-secondary)',background:'var(--color-background-secondary)',color:'var(--color-text-primary)',fontSize:14}}),
      err&&h('div',{style:{fontSize:13,color:'var(--color-text-danger)',marginBottom:10}},err),
      h('button',{onClick:go,disabled:!key.trim()||testing,style:{width:'100%',padding:12,borderRadius:'var(--border-radius-md)',border:'none',background:key.trim()&&!testing?'var(--color-text-info)':'var(--color-border-secondary)',color:key.trim()&&!testing?'#fff':'var(--color-text-tertiary)',fontSize:15,fontWeight:500,cursor:key.trim()&&!testing?'pointer':'default',transition:'all 0.2s'}},testing?'Verifico...':'Salva e inizia')
    )
  );
}

function Timer({initialSec,label}){
  const [rem,setRem]=useState(initialSec),[running,setRunning]=useState(false),[fin,setFin]=useState(false);
  const iv=useRef(null);
  useEffect(()=>{if(running){iv.current=setInterval(()=>{setRem(r=>{if(r<=1){clearInterval(iv.current);setRunning(false);setFin(true);return 0;}return r-1;});},1000);}return()=>clearInterval(iv.current);},[running]);
  const tog=()=>{if(fin){setRem(initialSec);setFin(false);return;}setRunning(r=>!r);};
  const m=Math.floor(rem/60),s=rem%60,ts=m>0?`${m}:${s.toString().padStart(2,'0')}`:`${s}s`;
  return h('button',{onClick:tog,style:{display:'flex',alignItems:'center',gap:4,padding:'5px 10px',borderRadius:'var(--border-radius-md)',border:'0.5px solid var(--color-border-secondary)',background:fin?'var(--color-background-success)':running?'var(--color-background-warning)':'var(--color-background-secondary)',color:fin?'var(--color-text-success)':running?'var(--color-text-warning)':'var(--color-text-secondary)',fontSize:12,cursor:'pointer',transition:'all 0.2s',whiteSpace:'nowrap'}},
    h('svg',{width:10,height:10,viewBox:'0 0 10 10'},fin?h('path',{d:'M1 5l3 3 5-5',stroke:'currentColor',strokeWidth:1.5,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'}):running?h('g',null,h('rect',{x:2,y:1,width:2.5,height:8,fill:'currentColor'}),h('rect',{x:5.5,y:1,width:2.5,height:8,fill:'currentColor'})):h('path',{d:'M2 1l7 4-7 4V1z',fill:'currentColor'})),
    fin?'Fatto!':running?ts:`${label||'Timer'} ${ts}`
  );
}

function MiniChart({points,color}){
  if(!points||points.length<2)return null;
  const W=280,H=80,PX=24,PY=10,vals=points.map(p=>p.v),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  const cx=i=>PX+(i/(points.length-1))*(W-2*PX),cy=v=>PY+((mx-v)/rng)*(H-2*PY);
  const d=points.map((p,i)=>`${i===0?'M':'L'}${cx(i).toFixed(1)} ${cy(p.v).toFixed(1)}`).join(' ');
  return h('svg',{width:'100%',viewBox:`0 0 ${W} ${H}`,style:{overflow:'visible'}},h('path',{d,fill:'none',stroke:color,strokeWidth:1.5,strokeLinecap:'round',strokeLinejoin:'round'}),...points.map((p,i)=>h('g',{key:i},h('circle',{cx:cx(i),cy:cy(p.v),r:3,fill:color}),h('text',{x:cx(i),y:H+2,textAnchor:'middle',fontSize:9,fill:'var(--color-text-tertiary)'},p.label))));
}

function CalGrid({dates,restDates}){
  const cells=[],now=new Date();
  for(let i=29;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];const isW=(dates||[]).includes(k),isR=(restDates||[]).includes(k);cells.push(h('div',{key:k,style:{aspectRatio:'1',borderRadius:3,background:isW?'var(--color-background-success)':isR?'var(--color-background-info)':'var(--color-background-secondary)',border:`0.5px solid ${isW?'var(--color-border-success)':isR?'var(--color-border-info)':'var(--color-border-tertiary)'}`}}));}
  return h('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:3}},cells);
}

function App(){
  const [apiKey,setApiKey]=useState(lsGet('fit_api_key'));
  const [tab,setTab]=useState('oggi'),[dietTab,setDietTab]=useState('diario');
  const [workout,setWorkout]=useState(null),[diet,setDiet]=useState(null);
  const [measures,setMeasures]=useState([]),[streak,setStreak]=useState({count:0,total:0,lastDate:null,dates:[]});
  const [checked,setChecked]=useState(new Set()),[done,setDone]=useState(false),[isRestDay,setIsRestDay]=useState(false);
  const [restDates,setRestDates]=useState([]);
  const [energy,setEnergy]=useState(0),[repLogs,setRepLogs]=useState({});
  const [loadingW,setLoadingW]=useState(false),[loadingD,setLoadingD]=useState(false);
  const [celebrated,setCelebrated]=useState(false);
  const [mPeso,setMPeso]=useState(''),[mGiro,setMGiro]=useState(''),[mSaved,setMSaved]=useState(false);
  const [extras,setExtras]=useState([]),[extraInput,setExtraInput]=useState('');
  const [coachQ,setCoachQ]=useState(''),[coachA,setCoachA]=useState(''),[loadingCoach,setLoadingCoach]=useState(false);
  const [weeklySummary,setWeeklySummary]=useState(''),[loadingWeekly,setLoadingWeekly]=useState(false);
  const [foodLog,setFoodLog]=useState([]),[foodNome,setFoodNome]=useState(''),[foodGrammi,setFoodGrammi]=useState('');
  const [foodAnalysis,setFoodAnalysis]=useState(null),[loadingFood,setLoadingFood]=useState(false);
  const [water,setWater]=useState(0),[showSettings,setShowSettings]=useState(false);
  const [chatMessages,setChatMessages]=useState([]),[chatInput,setChatInput]=useState(''),[loadingChat,setLoadingChat]=useState(false),[sessionDone,setSessionDone]=useState(false);
  const dietRef=useRef(false);

  useEffect(()=>{if(apiKey)init();},[apiKey]);

  async function loadRepHistory(){
    const hist=[];
    for(let i=1;i<=5;i++){const d=new Date();d.setDate(d.getDate()-i);const k=d.toISOString().split('T')[0];const rr=lsGetJ(`fit_reps_${k}`),ww=lsGetJ(`fit_w_${k}`);if(rr&&ww&&ww.exercises){hist.push(ww.exercises.map((e,idx)=>({nome:e.nome,prescritto:e.reps,fatto:rr[idx]??null})));}}
    return hist;
  }

  async function init(){
    const s=lsGetJ('fit_streak');if(s)setStreak(s);
    const m=lsGetJ('fit_measures');if(m)setMeasures(m);
    let exts=[];const ex=lsGetJ('fit_extras');if(ex){exts=ex;setExtras(ex);}
    const en=lsGet(`fit_energy_${TODAY}`);if(en)setEnergy(parseInt(en));
    const rl=lsGetJ(`fit_reps_${TODAY}`);if(rl)setRepLogs(rl);
    const rd=lsGetJ('fit_rest_dates');if(rd)setRestDates(rd);
    const ws=lsGet(`fit_weekly_${getWeekKey()}`);if(ws)setWeeklySummary(ws);
    const fl=lsGetJ(`fit_food_${TODAY}`);if(fl)setFoodLog(fl);
    const fa=lsGetJ(`fit_food_analysis_${TODAY}`);if(fa)setFoodAnalysis(fa);
    const wa=lsGet(`fit_water_${TODAY}`);if(wa)setWater(parseInt(wa)||0);
    const ch=lsGetJ(`fit_chat_${TODAY}`);if(ch&&ch.length>0){setChatMessages(ch);setSessionDone(true);}
    const w=lsGetJ(`fit_w_${TODAY}`);
    if(w){setWorkout(w);if(w.restDay)setIsRestDay(true);else if(w.done){setDone(true);setChecked(new Set(w.exercises.map((_,i)=>i)));}return;}
    genWorkout(false,exts);
  }

  async function genWorkout(isRegen,extOvr){
    setLoadingW(true);if(isRegen){setWorkout(null);setChecked(new Set());setDone(false);setRepLogs({});}
    const exts=extOvr||extras,repHist=await loadRepHistory();
    const histTxt=repHist.length?`\nStorico reps recenti (adatta): ${JSON.stringify(repHist)}`:'';
    try{
      const data=await callAPI(`Sei un personal trainer con 30+ anni di esperienza. Diretto, onesto, motivante.\nProfilo: ${getProfile(exts)}${histTxt}\nRispondi SOLO con JSON senza markdown:\n{"coachMessage":"2 frasi oneste e motivanti","nlpPhrase":"1 frase PNL (tecnica tra parentesi)","exercises":[{"nome":"str","sets":"str","reps":"str","come":"str","perche":"str","youtubeQuery":"str","timerSec":0,"timerLabel":"str"}],"dietaRapida":[{"pasto":"str","kcal":0,"cosa":"str"}]}\n4-5 esercizi SICURI. Adatta reps allo storico.${isRegen?' Variante diversa.':''}`,
        `Workout per ${new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}.`);
      const wd={...data,done:false};setWorkout(wd);lsSet(`fit_w_${TODAY}`,wd);
    }catch(e){setWorkout({error:true,msg:e.message});}
    setLoadingW(false);
  }

  async function genDiet(){
    if(diet||loadingD||dietRef.current)return;dietRef.current=true;setLoadingD(true);
    const cached=lsGetJ('fit_diet');if(cached){setDiet(cached);setLoadingD(false);dietRef.current=false;return;}
    try{
      const data=await callAPI(`Sei un dietologo esperto ma PRATICO e FLESSIBILE. Cibo italiano normale, accessibile, che la gente mangia davvero. Niente diete impossibili.\nProfilo: ${getProfile(extras)}\nRispondi SOLO con JSON:\n{"intro":"str","calorie":0,"macro":{"p":0,"c":0,"g":0},"pasti":[{"nome":"str","orario":"str","kcal":0,"cibi":[{"n":"str","q":"str","kcal":0}],"nota":"str (consiglio pratico e realistico)"}],"regole":["str","str","str"]}`,
        '5 pasti: Colazione,Spuntino,Pranzo,Spuntino,Cena.');
      setDiet(data);lsSet('fit_diet',data);
    }catch(e){setDiet({error:true});}
    setLoadingD(false);dietRef.current=false;
  }

  async function addFood(){
    if(!foodNome.trim()||!foodGrammi)return;
    const upd=[...foodLog,{nome:foodNome.trim(),grammi:parseFloat(foodGrammi)}];
    setFoodLog(upd);setFoodNome('');setFoodGrammi('');setFoodAnalysis(null);lsSet(`fit_food_${TODAY}`,upd);
  }
  async function removeFood(i){const upd=foodLog.filter((_,idx)=>idx!==i);setFoodLog(upd);setFoodAnalysis(null);lsSet(`fit_food_${TODAY}`,upd);}

  async function analyzeFood(){
    if(!foodLog.length||loadingFood)return;setLoadingFood(true);
    try{
      const data=await callAPI(
        `Sei un dietologo e nutrizionista esperto ma empatico. Analizza gli alimenti con onestà ma senza essere giudicante. Rispondi SOLO con JSON:\n{"items":[{"nome":"str","grammi":0,"kcal":0,"p":0,"c":0,"g":0}],"totale":{"kcal":0,"p":0,"c":0,"g":0},"bilancio":"str (bilancio calorico chiaro)","coseBuone":"str (cosa hai mangiato di positivo oggi e perché fa bene al tuo corpo, 2 frasi incoraggianti)","coseErrate":"str (cosa migliorare e PERCHÉ fisiologicamente quel cibo non ti aiuta a raggiungere i tuoi obiettivi, specifico e educativo, 2-3 frasi)","suggerimenti":"str (consigli pratici e REALISTICI per domani, non impossibili, 2 frasi)","acqua":"str (consiglio acqua personalizzato)"}`,
        `Alimenti consumati: ${JSON.stringify(foodLog)}. Target: 1750 kcal, 130g proteine.`);
      setFoodAnalysis(data);lsSet(`fit_food_analysis_${TODAY}`,data);
    }catch(e){setFoodAnalysis({error:true});}
    setLoadingFood(false);
  }

  async function complete(){
    if(!workout||done||isRestDay)return;
    const upd={...workout,done:true};setWorkout(upd);setDone(true);setCelebrated(true);setTimeout(()=>setCelebrated(false),2500);
    let s={...streak};if(s.lastDate===TODAY)return;
    const yest=new Date();yest.setDate(yest.getDate()-1);const yk=yest.toISOString().split('T')[0];
    s.count=(s.lastDate===yk||restDates.includes(yk))?s.count+1:1;s.lastDate=TODAY;s.total=(s.total||0)+1;s.dates=[...(s.dates||[]),TODAY];
    setStreak(s);lsSet('fit_streak',s);lsSet(`fit_w_${TODAY}`,upd);
  }

  async function markRestDay(){
    if(done||isRestDay)return;
    if(!confirm('Sei sicuro di voler segnare oggi come giorno di riposo? Non potrai completare il workout.'))return;
    setIsRestDay(true);
    const upd=[...restDates,TODAY];setRestDates(upd);lsSet('fit_rest_dates',upd);
    let s={...streak};if(s.lastDate===TODAY)return;
    const yest=new Date();yest.setDate(yest.getDate()-1);const yk=yest.toISOString().split('T')[0];
    if(s.lastDate===yk||restDates.includes(yk)){s.lastDate=TODAY;}else{s.count=0;s.lastDate=TODAY;}
    setStreak(s);lsSet('fit_streak',s);lsSet(`fit_w_${TODAY}`,{...workout,restDay:true});
  }

  async function saveMeasure(){
    if(!mPeso&&!mGiro)return;
    const entry={date:TODAY,peso:mPeso?parseFloat(mPeso):null,girovita:mGiro?parseFloat(mGiro):null};
    const upd=[...measures.filter(m=>m.date!==TODAY),entry].sort((a,b)=>a.date.localeCompare(b.date));
    setMeasures(upd);lsSet('fit_measures',upd);setMSaved(true);setTimeout(()=>setMSaved(false),2000);setMPeso('');setMGiro('');
  }

  function saveEnergy(val){setEnergy(val);lsSet(`fit_energy_${TODAY}`,String(val));}
  function saveRepLog(idx,val){const upd={...repLogs,[idx]:val};setRepLogs(upd);lsSet(`fit_reps_${TODAY}`,upd);}
  function addWater(n){const upd=Math.max(0,water+n);setWater(upd);lsSet(`fit_water_${TODAY}`,String(upd));}
  function addExtra(){if(!extraInput.trim())return;const upd=[...extras,extraInput.trim()];setExtras(upd);setExtraInput('');lsSet('fit_extras',upd);}
  function removeExtra(i){const upd=extras.filter((_,idx)=>idx!==i);setExtras(upd);lsSet('fit_extras',upd);}

  async function askCoach(){
    if(!coachQ.trim()||loadingCoach)return;const q=coachQ;setCoachQ('');setLoadingCoach(true);
    try{const ans=await callTxt(`Sei un personal trainer esperto. Italiano, diretto, conciso (3-4 frasi). No elenchi.\nProfilo: ${getProfile(extras)}\nWorkout oggi: ${workout?.exercises?.map(e=>e.nome).join(', ')||'—'}. Energia: ${energy||'—'}/5.`,q);setCoachA(ans);}
    catch(e){setCoachA('Errore di connessione. Riprova.');}
    setLoadingCoach(false);
  }

  async function genWeeklySummary(){
    if(loadingWeekly)return;setLoadingWeekly(true);
    const l7=streak.dates.filter(d=>(new Date()-new Date(d))/864e5<=7).length;
    const r7=restDates.filter(d=>(new Date()-new Date(d))/864e5<=7).length;
    try{const txt=await callTxt(`Sei un coach personale. Riepilogo settimanale in italiano: onesto, motivante, 5 frasi, tecnica PNL reframing.\nProfilo: ${getProfile(extras)}`,`Settimana: ${l7} allenamenti, ${r7} riposi. Streak: ${streak.count}. Totale: ${streak.total||0}.`);setWeeklySummary(txt);lsSet(`fit_weekly_${getWeekKey()}`,txt);}
    catch(e){}setLoadingWeekly(false);
  }

  // Derived
  const lastM=measures[measures.length-1],daysSince=lastM?Math.floor((new Date()-new Date(lastM.date))/864e5):999,showReminder=daysSince>=28;
  const allChecked=workout?.exercises&&checked.size===workout.exercises.length;
  const currW=measures.length>0&&measures[measures.length-1]?.peso?measures[measures.length-1].peso:null;
  const startW=measures.length>0&&measures[0]?.peso?measures[0].peso:null;
  const wDiff=currW&&startW?(currW-startW).toFixed(1):null;
